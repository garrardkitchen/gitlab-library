name: Publish Docker Image

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    environment: docker-production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Garrard.GitLab.McpServer/Dockerfile
          push: true
          tags: |
            garrardkitchen/gitlab-mcp:latest
            garrardkitchen/gitlab-mcp:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Update Docker Hub Description with Changelog
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: garrardkitchen/gitlab-mcp
          readme-filepath: ./CHANGELOG.md
          short-description: " The MCP server exposes the Garrard.GitLab library as a set of AI-callable tools,  allowing LLM clients (like Claude Desktop or VS Code Copilot) to automate GitLab operations — such as creating groups/projects, managing variables, cloning repositories, and creating access tokens — via natural language. It supports both stdio and HTTP transports, making it compatible with any MCP-compliant AI host."

